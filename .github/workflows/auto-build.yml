name: Auto Build and Push Phantun

on:
  # 每天 UTC 时间凌晨 2 点（北京时间上午 10 点）自动运行一次
  schedule:
    - cron: '0 2 * * *'
  # 允许在 GitHub 网页上手动点击按钮触发运行
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: 获取官方最新版本号
        id: get_version
        run: |
          # 通过 GitHub API 获取 dndx/phantun 的最新 Release Tag
          LATEST_TAG=$(curl -sL https://api.github.com/repos/dndx/phantun/releases/latest | jq -r ".tag_name")
          echo "获取到的最新版本为: $LATEST_TAG"
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          
      - name: 检查镜像是否已存在
        id: check_image
        run: |
          # 检查你的 Docker Hub 中是否已经有这个版本的镜像了
          if docker manifest inspect ${{ secrets.DOCKERHUB_USERNAME }}/phantun:${{ env.LATEST_TAG }} > /dev/null 2>&1; then
            echo "版本 ${{ env.LATEST_TAG }} 已经存在，跳过构建。"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "发现新版本 ${{ env.LATEST_TAG }}，准备构建！"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: 检出当前仓库代码
        if: steps.check_image.outputs.should_build == 'true'
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx 环境
        if: steps.check_image.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        if: steps.check_image.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送到 Docker Hub
        if: steps.check_image.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            PHANTUN_VER=${{ env.LATEST_TAG }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/phantun:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/phantun:${{ env.LATEST_TAG }}

      - name: 自动同步 README 到 Docker Hub
        if: steps.check_image.outputs.should_build == 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/phantun
          readme-filepath: ./README.md
